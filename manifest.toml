#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "feedpushr"
name = "Feedpushr"
description.en = "Simple feed aggregator service"
description.fr = "Service simple d'agrégation de flux"

version = "3.4.1~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "GPL-3.0"
code = "https://github.com/ncarlier/feedpushr"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/example"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    #[install.admin]
    #type = "user"

[resources]

    [resources.sources]

    [resources.sources.main]

    url = "https://github.com/ncarlier/feedpushr/releases/download/v3.4.1/feedpushr-linux-amd64.tgz"
    sha256 = "1ab55f46c61234e074950ec16f00deedc44a81cf311293d7aeaecd5808d711fc"

    autoupdate.strategy = "latest_github_release"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]
